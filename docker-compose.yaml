services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - rabbitmq

  scheduler:
    build: ./scheduler
    depends_on:
      - postgres
      - rabbitmq
